# .github/workflows/monitor-lunes-2captcha.yml
name: Lunes Monitor with 2captcha

on:
  schedule:
    # 每10天凌晨3点运行 (UTC 3:00 = 北京时间 11:00)
    - cron: '0 3 */10 * *'
  
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动测试'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 2captcha可能需要较长时间
    
    env:
      LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
      LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
      APIKEY_2CAPTCHA: ${{ secrets.APIKEY_2CAPTCHA }}
      WECHAT_WEBHOOK_KEY: ${{ secrets.WECHAT_WEBHOOK_KEY }}
      GITHUB_ACTIONS: "true"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Chrome
      run: |
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install DrissionPage requests twocaptcha

    - name: Run monitor
      run: |
        python scripts/monitor_lunes_2captcha.py

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots-${{ github.run_id }}
        path: "*.png"
        retention-days: 5
